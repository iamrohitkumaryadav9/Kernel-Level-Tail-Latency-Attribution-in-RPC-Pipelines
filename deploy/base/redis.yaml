apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: latency-lab
  labels:
    app: pipeline
    service: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      service: redis
  template:
    metadata:
      labels:
        app: pipeline
        service: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: latency-lab
spec:
  selector:
    service: redis
  ports:
  - port: 6379
    targetPort: 6379
