apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: latency-lab
  labels:
    app: pipeline
    service: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      service: auth
  template:
    metadata:
      labels:
        app: pipeline
        service: auth
    spec:
      containers:
      - name: auth
        image: latency-attribution-auth:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50052
        env:
        - name: LISTEN_ADDR
          value: ":50052"
        - name: DOWNSTREAM_ADDR
          value: "risk-svc:50053"
        - name: DELAY_US
          value: "50"
        - name: DELAY_MODE
          value: "busyspin"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "jaeger-svc:4317"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-svc
  namespace: latency-lab
spec:
  selector:
    service: auth
  ports:
  - port: 50052
    targetPort: 50052
