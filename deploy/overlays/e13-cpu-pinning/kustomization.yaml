# E13: Mitigation — CPU Pinning (same-node, NO contention)
# Blueprint: SN / Pinned / None / Pod
# Uses Guaranteed QoS (requests == limits, integer CPU) for static CPU manager
# NO stress-ng — clean pinning measurement (stress belongs in E14)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: latency-lab

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "1"
            memory: "128Mi"
          requests:
            cpu: "1"
            memory: "128Mi"
  - target:
      kind: Deployment
      name: auth
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "1"
            memory: "128Mi"
          requests:
            cpu: "1"
            memory: "128Mi"
  - target:
      kind: Deployment
      name: risk
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "1"
            memory: "128Mi"
          requests:
            cpu: "1"
            memory: "128Mi"
  - target:
      kind: Deployment
      name: marketdata
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "1"
            memory: "128Mi"
          requests:
            cpu: "1"
            memory: "128Mi"
  - target:
      kind: Deployment
      name: execution
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "1"
            memory: "128Mi"
          requests:
            cpu: "1"
            memory: "128Mi"
