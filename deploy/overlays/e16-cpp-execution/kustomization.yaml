# E16: C++ Matching Engine — replace Go execution with C++ implementation
# Tests: lock-free order book, slab allocator, cache-line aligned orders
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: latency-lab

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: execution
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: latency-attribution-cpp-execution:latest
