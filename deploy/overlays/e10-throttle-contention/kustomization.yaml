# E10: CFS Throttle + Contention (same-node)
# Blueprint: SN / 200m / stress-ng / Pod
# 200m CPU limit + stress-ng CPU hogs, ALL on same node
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: latency-lab

resources:
  - ../../base
  - cpu-hog.yaml

patches:
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: auth
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: risk
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: marketdata
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: execution
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
