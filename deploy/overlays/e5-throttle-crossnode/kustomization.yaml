# E5: CFS Throttling (200m) + Cross-Node
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: latency-lab

resources:
  - ../../base

patches:
  # Node placement (same as E2)
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: auth
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: risk
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-b
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: marketdata
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-b
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: execution
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-b
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
