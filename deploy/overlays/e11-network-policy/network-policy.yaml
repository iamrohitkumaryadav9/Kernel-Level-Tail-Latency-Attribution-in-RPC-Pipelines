# E11: Network Policy — allow-list rules only (no default-deny)
# Measures overhead of having NetworkPolicy objects evaluated
# NOTE: kindnet enforces policies; default-deny breaks DNS resolution
# So we use allow-list-only policies which add overhead without blocking
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway
  namespace: latency-lab
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth
  namespace: latency-lab
spec:
  podSelector:
    matchLabels:
      app: auth
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - port: 50051
  egress:
    - {}
---
