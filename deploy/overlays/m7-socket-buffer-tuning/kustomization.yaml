# M7: Socket Buffer Tuning — Blueprint §08
# Increases socket buffer sizes and backlog to reduce packet drops under burst load
# Targets: lower retransmission rate, more stable tail latency during microbursts
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: latency-lab

resources:
  - ../../base

patches:
  # Add socket buffer tuning init container
  - target:
      kind: Deployment
      name: gateway
    patch: &sockbuf-patch |
      - op: add
        path: /spec/template/spec/initContainers
        value:
          - name: socket-buffer-tuner
            image: busybox:1.36
            securityContext:
              privileged: true
            command:
              - sh
              - -c
              - |
                # Increase socket buffer maximums (16MB)
                sysctl -w net.core.rmem_max=16777216 2>/dev/null || true
                sysctl -w net.core.wmem_max=16777216 2>/dev/null || true
                # TCP memory auto-tuning range: min=4KB, default=128KB, max=16MB
                sysctl -w net.ipv4.tcp_rmem="4096 131072 16777216" 2>/dev/null || true
                sysctl -w net.ipv4.tcp_wmem="4096 65536 16777216" 2>/dev/null || true
                # Increase netdev backlog for burst absorption
                sysctl -w net.core.netdev_max_backlog=5000 2>/dev/null || true
                # Increase somaxconn for gRPC listener queue
                sysctl -w net.core.somaxconn=4096 2>/dev/null || true
                # Enable TCP window scaling
                sysctl -w net.ipv4.tcp_window_scaling=1 2>/dev/null || true
                echo "✓ Socket buffer tuning applied (16MB max, backlog=5000)"

  - target:
      kind: Deployment
      name: auth
    patch: *sockbuf-patch

  - target:
      kind: Deployment
      name: risk
    patch: *sockbuf-patch

  - target:
      kind: Deployment
      name: marketdata
    patch: *sockbuf-patch

  - target:
      kind: Deployment
      name: execution
    patch: *sockbuf-patch
