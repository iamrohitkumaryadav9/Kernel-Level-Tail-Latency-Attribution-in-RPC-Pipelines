# stress-ng CPU hog pods for E7 — one per node for controlled contention
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-hog-a
  namespace: latency-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-hog
      node-target: node-a
  template:
    metadata:
      labels:
        app: cpu-hog
        node-target: node-a
    spec:
      nodeSelector:
        node-role: node-a
      containers:
      - name: stress
        image: alexeiled/stress-ng
        args: ["--cpu", "4", "--timeout", "0"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-hog-b
  namespace: latency-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-hog
      node-target: node-b
  template:
    metadata:
      labels:
        app: cpu-hog
        node-target: node-b
    spec:
      nodeSelector:
        node-role: node-b
      containers:
      - name: stress
        image: alexeiled/stress-ng
        args: ["--cpu", "4", "--timeout", "0"]
