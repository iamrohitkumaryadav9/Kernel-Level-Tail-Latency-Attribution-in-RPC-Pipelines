# E15: Full Isolation — CPU pinning + hostNetwork + cross-node + stress-ng
# Best-case mitigation: breaks the softirq→contention→throttling feedback loop
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: latency-lab

resources:
  - ../../base
  - cpu-hog.yaml

patches:
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/hostNetwork
        value: true
      - op: add
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirstWithHostNet
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "1"
            memory: "128Mi"
          requests:
            cpu: "1"
            memory: "128Mi"
  - target:
      kind: Deployment
      name: auth
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role: node-a
      - op: add
        path: /spec/template/spec/hostNetwork
