# E3a: CFS Throttling — Tight (200m CPU limit)
# Blueprint: "CFS bandwidth control. Threads blocked until next period boundary."
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: latency-lab

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: auth
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: risk
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: marketdata
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
  - target:
      kind: Deployment
      name: execution
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "200m"
          requests:
            cpu: "100m"
